name: Codex Auto-Fix

# Reacciona a comentarios de Codex (chatgpt-codex-connector[bot]) en PRs y
# aplica un fix automatico commiteando+pusheando a la rama del PR.
#
# Cubre tanto comentarios generales del PR (issue_comment) como comentarios
# inline de review sobre el diff (pull_request_review_comment).

# DESHABILITADO: los triggers automaticos estan comentados para que el workflow
# no reaccione a comentarios de Codex. El auto-fix se hace con el loop local
# (ver docs/codex-autofix-loop.md).
#
# `workflow_dispatch` queda declarado solo para mantener el archivo valido y
# permitir reactivar el modo automatico descomentando los eventos de abajo. NO
# es un disparo manual funcional: todo el job es comment-driven (lee
# `github.event.comment.*`), asi que en un run manual no hay comentario de Codex
# y el guard del job lo saltea a proposito (no procesa nada).
on:
  workflow_dispatch:
  # issue_comment:
  #   types: [created]
  # pull_request_review_comment:
  #   types: [created]

# Evita que dos comentarios casi simultaneos en el mismo PR pisen el push del
# otro: se serializan por PR.
concurrency:
  group: codex-autofix-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  codex-autofix:
    # Solo corre si el autor del comentario es el bot de Codex y el comentario
    # pertenece a un PR (no a un issue suelto).
    if: >
      github.event.comment.user.login == 'chatgpt-codex-connector[bot]' &&
      (github.event.issue.pull_request != null || github.event.pull_request != null)
    runs-on: ubuntu-latest
    steps:
      - name: Resolver numero de PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_PR_NUMBER: ${{ github.event.issue.number }}
          REVIEW_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_NUMBER="${ISSUE_PR_NUMBER:-$REVIEW_PR_NUMBER}"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout rama del PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr checkout ${{ steps.pr.outputs.number }}
          git config user.name "codex-autofix[bot]"
          git config user.email "codex-autofix@users.noreply.github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Capturar HEAD previo
        id: base
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Marcar comentario en progreso
        id: progress
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # La API de reacciones difiere segun el tipo de comentario.
          if [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            REACTION_BASE="repos/${REPO}/pulls/comments/${COMMENT_ID}"
          else
            REACTION_BASE="repos/${REPO}/issues/comments/${COMMENT_ID}"
          fi
          echo "reaction_base=$REACTION_BASE" >> "$GITHUB_OUTPUT"

          # 👀 = "lo agarre, estoy trabajando".
          REACTION_ID="$(gh api -X POST "${REACTION_BASE}/reactions" -f content=eyes --jq '.id' || true)"
          echo "reaction_id=$REACTION_ID" >> "$GITHUB_OUTPUT"

          # Comentario con el link al run para trazabilidad.
          BODY="🤖 Procesando este comentario automáticamente. Seguí el progreso acá: ${RUN_URL}"
          if [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            gh api -X POST "repos/${REPO}/pulls/${PR_NUMBER}/comments/${COMMENT_ID}/replies" -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$BODY"
          fi

      - name: Aplicar fix con Claude Code
        id: fix
        uses: anthropics/claude-code-action@v1
        env:
          # Contexto del comentario expuesto a la herramienta.
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_PATH: ${{ github.event.comment.path }}
          COMMENT_LINE: ${{ github.event.comment.line }}
          COMMENT_DIFF_HUNK: ${{ github.event.comment.diff_hunk }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Este workflow existe para reaccionar a comentarios del bot de Codex,
          # por lo que hay que habilitar explicitamente ese actor no-humano.
          allowed_bots: "chatgpt-codex-connector"
          claude_args: "--max-turns 30"
          prompt: |
            Sos un agente de fix automatico disparado por un comentario de Codex
            en el PR #${{ steps.pr.outputs.number }}. El working tree ya esta en
            la rama del PR (checkout efimero del runner). Tu objetivo es resolver
            EXACTAMENTE lo que pide el comentario y dejar el cambio commiteado y
            pusheado.

            Comentario de Codex a resolver:
            ---
            ${{ github.event.comment.body }}
            ---
            Archivo referenciado (si aplica, comentario inline): ${{ github.event.comment.path }}
            Linea: ${{ github.event.comment.line }}
            Diff hunk de contexto:
            ${{ github.event.comment.diff_hunk }}

            Instrucciones:
            1. Entende el comentario y localiza el codigo afectado. Si el
               comentario es ambiguo o no es accionable (ej. una pregunta, un
               elogio, o "LGTM"), NO hagas cambios: termina sin commitear.
            2. Aplica el cambio minimo y enfocado que resuelve el comentario.
               No hagas refactors no pedidos ni toques codigo no relacionado.
            3. Respeta las convenciones del repo. Si agregas o cambias logica,
               agrega o actualiza los tests correspondientes.
            4. Valida antes de commitear que tu cambio no introduce fallas
               nuevas:
               - npm run lint
               - npm run typecheck
               - npm test
               Solo te interesan las fallas causadas por tu cambio. Si hay
               errores preexistentes ajenos al comentario, NO los persigas:
               dejalos como estan y segui.
            5. Commiteá con un mensaje claro en imperativo que referencie el
               comentario, por ejemplo:
               "fix: resolver comentario de Codex en <archivo>"
               Incrustá al final del cuerpo del commit el link:
               ${{ github.event.comment.html_url }}
            6. Pusheá a la rama del PR (git push).
            7. Si no hiciste ningun cambio, explica por que en tu respuesta y
               no commitees nada.
            8. Si aplicaste un fix (commiteaste + pusheaste), escribi en
               `.codex-autofix/summary.txt` UNA sola linea en español que
               resuma que cambio y su efecto. Ejemplo:
               "normalizeExpenseItemsForSave ahora propaga occurrencesUnit; subir
               un comprobante ya no borra la unidad guardada".
               Ese archivo esta gitignored (estado de runtime): no lo commitees.
               Si no hiciste cambios, no lo crees.

      - name: Cerrar comentario (reaccion final, reply y resolve)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          BEFORE_SHA: ${{ steps.base.outputs.sha }}
          FIX_OUTCOME: ${{ steps.fix.outcome }}
          REACTION_BASE: ${{ steps.progress.outputs.reaction_base }}
          REACTION_ID: ${{ steps.progress.outputs.reaction_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          AFTER_SHA="$(git rev-parse HEAD 2>/dev/null || echo '')"
          CHANGED=false
          if [ -n "$AFTER_SHA" ] && [ -n "$BEFORE_SHA" ] && [ "$AFTER_SHA" != "$BEFORE_SHA" ]; then
            CHANGED=true
          fi

          # Sacar el 👀 de "en progreso" si lo habiamos puesto.
          if [ -n "$REACTION_BASE" ] && [ -n "$REACTION_ID" ]; then
            gh api -X DELETE "${REACTION_BASE}/reactions/${REACTION_ID}" || true
          fi

          # Reaccion final + mensaje segun resultado, usando un template fijo de
          # comentario de cierre (mantener en paridad con docs/codex-autofix-loop.md).
          #
          # 👎 (-1) es la senal de "sugerencia incorrecta/no util" que Codex
          # interpreta sobre SU comentario. Por eso solo se usa cuando el agente
          # evaluo la sugerencia y concluyo que no requeria cambios. Si el fix no
          # se pudo aplicar por una falla del propio Action (error de infra/agente),
          # NO mandamos 👎: usamos 😕 (confused) para pedir atencion humana sin
          # desvalorizar la sugerencia.
          SHORT_SHA="${AFTER_SHA:0:7}"
          COMMIT_URL="${SERVER_URL}/${REPO}/commit/${AFTER_SHA}"
          # Resumen de una linea que dejo el paso de fix (gitignored, runtime).
          SUMMARY="$(head -n 1 .codex-autofix/summary.txt 2>/dev/null | tr -d '\r')"

          if [ "$FIX_OUTCOME" = "success" ] && [ "$CHANGED" = "true" ]; then
            FINAL_REACTION="rocket"
            if [ -n "$SUMMARY" ]; then
              BODY="$(printf '✅ **Resuelto** en [`%s`](%s).\n\n**Qué cambió:** %s\n\n<sub>🤖 Fix automático en respuesta a este comentario de Codex · [run](%s)</sub>' "$SHORT_SHA" "$COMMIT_URL" "$SUMMARY" "$RUN_URL")"
            else
              BODY="$(printf '✅ **Resuelto** en [`%s`](%s).\n\n<sub>🤖 Fix automático en respuesta a este comentario de Codex · [run](%s)</sub>' "$SHORT_SHA" "$COMMIT_URL" "$RUN_URL")"
            fi
          elif [ "$FIX_OUTCOME" = "success" ]; then
            FINAL_REACTION="-1"
            BODY="$(printf 'ℹ️ **Sin cambios.** Revisé la sugerencia pero no requería cambios de código.\n\n<sub>🤖 Auto-fix de Codex · [run](%s)</sub>' "$RUN_URL")"
          else
            FINAL_REACTION="confused"
            BODY="$(printf '⚠️ **No pude aplicar el fix** (falla del Action, no de la sugerencia).\n\n<sub>🤖 Auto-fix de Codex · [run](%s)</sub>' "$RUN_URL")"
          fi

          if [ -n "$REACTION_BASE" ]; then
            gh api -X POST "${REACTION_BASE}/reactions" -f content="$FINAL_REACTION" || true
          fi

          # Reply con el resultado en el hilo / PR.
          if [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            gh api -X POST "repos/${REPO}/pulls/${PR_NUMBER}/comments/${COMMENT_ID}/replies" -f body="$BODY" || true
          else
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$BODY" || true
          fi

          # Resolver el hilo solo si es review inline y hubo cambios.
          if [ "$EVENT_NAME" = "pull_request_review_comment" ] && [ "$CHANGED" = "true" ]; then
            REPO_NAME="${REPO#*/}"
            THREAD_ID="$(gh api graphql \
              -f query='query($owner:String!,$repo:String!,$pr:Int!){repository(owner:$owner,name:$repo){pullRequest(number:$pr){reviewThreads(first:100){nodes{id comments(first:100){nodes{databaseId}}}}}}}' \
              -F owner="$OWNER" -F repo="$REPO_NAME" -F pr="$PR_NUMBER" \
              --jq "[.data.repository.pullRequest.reviewThreads.nodes[] | select(any(.comments.nodes[]; .databaseId == ${COMMENT_ID})) | .id] | first // empty" || true)"
            if [ -n "$THREAD_ID" ]; then
              gh api graphql \
                -f query='mutation($threadId:ID!){resolveReviewThread(input:{threadId:$threadId}){thread{id isResolved}}}' \
                -F threadId="$THREAD_ID" || true
              echo "Hilo $THREAD_ID resuelto."
            fi
          fi
